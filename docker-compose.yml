services:
  redis:
    image: redis:6.2.6
    container_name: video-downloader-api-redis
    command: redis-server --requirepass eChTelptB2spNWp92Pv_U2FJd8tT9jQg
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=eChTelptB2spNWp92Pv_U2FJd8tT9jQg
    expose:
      - 6379
    networks:
      - backend_network
  redis-bullmq:
    image: redis:6.2.6
    container_name: video-downloader-api-redis-bullmq
    command: redis-server
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_HOST=redis-bullmq
      - REDIS_PORT=6379
    expose:
      - 6379
    networks:
      - backend_network
  redis-bullboard:
    image: deadly0/bull-board
    container_name: video-downloader-api-redis-bullboard
    ports:
      - '3011:3000'
    environment:
      - REDIS_HOST=redis-bullmq
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_USE_TLS=false
    depends_on:
      - redis-bullmq
    networks:
      - backend_network
  postgres:
    image: postgres:15-alpine
    container_name: video-downloader-api-postgres
    ports:
      - '5434:5432'
    environment:
      - POSTGRES_DB=video_downloader_db
      - POSTGRES_USER=video_downloader_user
      - POSTGRES_PASSWORD=video_downloader_password_2026
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_downloader_user -d video_downloader_db"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  backend_network:
    driver: bridge
